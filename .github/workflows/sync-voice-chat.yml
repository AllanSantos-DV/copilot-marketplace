name: sync-voice-chat

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-voice-chat
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync voice-chat from latest copilot-voice release
        env:
          GH_TOKEN: ${{ github.token }}
          SRC_REPO: AllanSantos-DV/copilot-voice
          DEST: plugins/voice-chat
        run: |
          set -euo pipefail
          TAG=$(gh release view --repo "$SRC_REPO" --json tagName -q .tagName)
          VER="${TAG#v}"
          echo "Latest release: $TAG (version $VER)"
          mkdir -p "$DEST"
          for f in extension.mjs voice_worker.py iframe.html tts.ps1 requirements.txt plugin.json; do
            gh release download "$TAG" --repo "$SRC_REPO" --pattern "$f" --output "$DEST/$f" --clobber
          done
          tmp=$(mktemp)
          jq --arg v "$VER" '(.plugins[] | select(.name == "voice-chat") | .version) = $v' \
            .github/plugin/marketplace.json > "$tmp" && mv "$tmp" .github/plugin/marketplace.json
          if [ -z "$(git status --porcelain)" ]; then
            echo "Already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(sync): voice-chat ${TAG} from release"
          git push
